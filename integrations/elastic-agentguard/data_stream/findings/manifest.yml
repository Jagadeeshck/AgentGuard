title: AgentGuard Findings
type: logs
dataset: agentguard.findings
streams:
  - input: logfile
    title: AgentGuard findings logfile
    description: Collect AgentGuard findings NDJSON events from local paths.
    template_path: stream.yml.hbs
    vars:
      - name: paths
        type: text
        title: Paths
        multi: true
        required: true
        show_user: true
        default:
          - /var/log/agentguard/findings.ndjson
      - name: tags
        type: text
        title: Tags
        multi: true
        required: false
        show_user: true
        default:
          - agentguard
