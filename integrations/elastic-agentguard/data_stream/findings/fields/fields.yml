- name: agentguard
  type: group
  fields:
    - name: finding.type
      type: keyword
    - name: finding.category
      type: keyword
    - name: finding.severity
      type: keyword
    - name: finding.description
      type: text
    - name: finding.source
      type: keyword
    - name: target.process.name
      type: keyword
    - name: target.service.name
      type: keyword
    - name: target.service.port
      type: long
    - name: target.extension.id
      type: keyword
    - name: target.extension.name
      type: keyword
    - name: target.path
      type: keyword
    - name: policy.matched
      type: boolean
    - name: policy.action
      type: keyword
- name: agentguard
  type: group
  fields:
    - name: ingest.error.message
      type: text
      description: Error message when the ingest pipeline fails to parse the JSON payload.
