name: E2E Sensor Integration

on:
  workflow_dispatch:

jobs:
  e2e-sensor-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elastic-package
        run: |
          curl -fsSL https://github.com/elastic/elastic-package/releases/download/v1.30.0/elastic-package_1.30.0_linux_amd64.tar.gz -o /tmp/elastic-package.tgz
          tar -xzf /tmp/elastic-package.tgz -C /tmp
          sudo install -m 0755 /tmp/elastic-package /usr/local/bin/elastic-package
          elastic-package version

      - name: Run E2E validation
        run: ./scripts/e2e-validate-sensor-output.sh
