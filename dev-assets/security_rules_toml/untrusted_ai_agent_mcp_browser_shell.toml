[rule]
author = ["AgentGuard"]
description = "Detects untrusted AI agent use of MCP browser or shell tooling based on declared capabilities and tool metadata."
from = "now-5m"
index = ["logs-agentguard.findings-*"]
language = "kuery"
license = "Elastic License v2"
name = "Untrusted AI Agent Using MCP Browser/Shell Tools"
query = '''event.module: "agentguard" and not agentguard.allowed: true and agentguard.finding.type: ("ai_security_tool_mcp_server" or "ai_agent_shell_tool_use" or "ai_cyber_agent_activity") and agentguard.cyber_agent.capabilities: "mcp" and agentguard.cyber_agent.capabilities: ("browser" or "shell")'''
references = []
risk_score = 84
rule_id = "agentguard_015"
severity = "high"
tags = ["AgentGuard", "Elastic Security", "AI Security", "MCP", "AI Cyber-Agent"]
type = "query"
