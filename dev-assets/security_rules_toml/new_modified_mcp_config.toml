[rule]
author = ["AgentGuard"]
description = "Detects new or modified mcp config from AgentGuard findings."
from = "now-5m"
index = ["logs-agentguard.findings-*"]
language = "kuery"
license = "Elastic License v2"
name = "New or Modified MCP Config"
query = '''event.module: "agentguard" and event.action: ("mcp_config_created" or "mcp_config_modified")'''
references = []
risk_score = 47
rule_id = "agentguard_007"
severity = "medium"
tags = ["AgentGuard", "Elastic Security", "AI Security"]
type = "query"
