[rule]
author = ["AgentGuard"]
description = "Detects AI agent findings with both shell and filesystem MCP capabilities, which can enable autonomous codebase inspection and tool execution."
from = "now-5m"
index = ["logs-agentguard.findings-*"]
language = "kuery"
license = "Elastic License v2"
name = "AI Agent With Shell and Filesystem MCP Access"
query = '''event.module: "agentguard" and not agentguard.allowed: true and agentguard.finding.type: ("ai_agent_shell_tool_use" or "ai_security_tool_mcp_server" or "ai_cyber_agent_activity") and agentguard.cyber_agent.capabilities: "shell" and agentguard.cyber_agent.capabilities: "filesystem"'''
references = []
risk_score = 85
rule_id = "agentguard_010"
severity = "high"
tags = ["AgentGuard", "Elastic Security", "AI Security", "MCP", "AI Cyber-Agent"]
type = "query"
