[rule]
author = ["AgentGuard"]
description = "Detects local llm service exposed beyond localhost from AgentGuard findings."
from = "now-5m"
index = ["logs-agentguard.findings-*"]
language = "kuery"
license = "Elastic License v2"
name = "Local LLM Service Exposed Beyond Localhost"
query = '''event.module: "agentguard" and agentguard.ai.local_service: true and destination.port: (11434 or 1234 or 7860 or 8000 or 8080) and not destination.ip: ("127.0.0.1" or "::1" or "localhost")'''
references = []
risk_score = 73
rule_id = "agentguard_005"
severity = "high"
tags = ["AgentGuard", "Elastic Security", "AI Security"]
type = "query"
