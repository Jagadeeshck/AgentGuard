[rule]
author = ["AgentGuard"]
description = "Detects ai browser extension with broad permissions from AgentGuard findings."
from = "now-5m"
index = ["logs-agentguard.findings-*"]
language = "kuery"
license = "Elastic License v2"
name = "AI Browser Extension With Broad Permissions"
query = '''event.module: "agentguard" and agentguard.finding.type: "browser_extension" and agentguard.extension.permissions: ("<all_urls>" or "scripting" or "webRequest" or "clipboardRead" or "nativeMessaging")'''
references = []
risk_score = 55
rule_id = "agentguard_004"
severity = "medium"
tags = ["AgentGuard", "Elastic Security", "AI Security"]
type = "query"
