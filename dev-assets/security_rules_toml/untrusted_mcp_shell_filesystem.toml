[rule]
author = ["AgentGuard"]
description = "Detects untrusted mcp server with shell or filesystem access from AgentGuard findings."
from = "now-5m"
index = ["logs-agentguard.findings-*"]
language = "kuery"
license = "Elastic License v2"
name = "Untrusted MCP Server With Shell or Filesystem Access"
query = '''event.module: "agentguard" and agentguard.finding.type: "mcp_server" and not agentguard.allowed: true and agentguard.mcp.capabilities: ("shell" or "filesystem")'''
references = []
risk_score = 75
rule_id = "agentguard_002"
severity = "high"
tags = ["AgentGuard", "Elastic Security", "AI Security"]
type = "query"
