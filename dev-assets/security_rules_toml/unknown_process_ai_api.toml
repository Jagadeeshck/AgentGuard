[rule]
author = ["AgentGuard"]
description = "Detects unknown process connecting to ai api from AgentGuard findings."
from = "now-5m"
index = ["logs-agentguard.findings-*"]
language = "kuery"
license = "Elastic License v2"
name = "Unknown Process Connecting to AI API"
query = '''event.module: "agentguard" and agentguard.finding.type: "ai_api_connection" and not agentguard.allowed: true and agentguard.ai.provider: *'''
references = []
risk_score = 55
rule_id = "agentguard_003"
severity = "medium"
tags = ["AgentGuard", "Elastic Security", "AI Security"]
type = "query"
