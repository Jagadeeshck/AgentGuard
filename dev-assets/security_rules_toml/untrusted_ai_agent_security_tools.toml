[rule]
author = ["AI Sentinel"]
description = "Detects untrusted AI agent findings that indicate security tool orchestration or security research capabilities. Behaviour-based and does not rely on an agent name."
from = "now-5m"
index = ["logs-ai_sentinel.findings-*"]
language = "kuery"
license = "Elastic License v2"
name = "Untrusted AI Agent Running Security Tools"
query = '''event.module: "ai_sentinel" and not ai_sentinel.allowed: true and ai_sentinel.finding.type: ("ai_security_tool_mcp_server" or "ai_cyber_agent_activity" or "ai_vulnerability_research_agent") and ai_sentinel.cyber_agent.security_tools: *'''
references = []
risk_score = 80
rule_id = "ai_sentinel_009"
severity = "high"
tags = ["AI Sentinel", "Elastic Security", "AI Security", "AI Cyber-Agent"]
type = "query"
