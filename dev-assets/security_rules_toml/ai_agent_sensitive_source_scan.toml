[rule]
author = ["AgentGuard"]
description = "Detects untrusted AI agent findings for sensitive source repository scanning, such as security-critical paths, infra-as-code, auth code, or secrets-related filenames."
from = "now-5m"
index = ["logs-agentguard.findings-*"]
language = "kuery"
license = "Elastic License v2"
name = "AI Agent Scanning Sensitive Source Code"
query = '''event.module: "agentguard" and not agentguard.allowed: true and agentguard.finding.type: "ai_agent_sensitive_repo_scan" and (agentguard.cyber_agent.target_paths: ("*auth*" or "*security*" or "*crypto*" or "*terraform*" or "*kubernetes*" or "*.env*" or "*secrets*") or agentguard.cyber_agent.suspicious_keywords: ("credential" or "secret" or "token" or "auth" or "crypto"))'''
references = []
risk_score = 78
rule_id = "agentguard_012"
severity = "high"
tags = ["AgentGuard", "Elastic Security", "AI Security", "Source Code", "AI Cyber-Agent"]
type = "query"
