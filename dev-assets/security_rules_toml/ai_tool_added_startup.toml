[rule]
author = ["AgentGuard"]
description = "Detects ai tool added to startup from AgentGuard findings."
from = "now-5m"
index = ["logs-agentguard.findings-*"]
language = "kuery"
license = "Elastic License v2"
name = "AI Tool Added to Startup"
query = '''event.module: "agentguard" and agentguard.finding.type: "startup_item" and not agentguard.allowed: true'''
references = []
risk_score = 50
rule_id = "agentguard_006"
severity = "medium"
tags = ["AgentGuard", "Elastic Security", "AI Security"]
type = "query"
