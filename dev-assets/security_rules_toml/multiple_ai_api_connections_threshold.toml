[rule]
author = ["AgentGuard"]
description = "Detects 10 or more untrusted AI API connection findings from the same host, process, and provider in five minutes."
from = "now-5m"
index = ["logs-agentguard.findings-*"]
language = "kuery"
license = "Elastic License v2"
name = "Multiple AI API Connections From Same Process"
query = '''event.module: "agentguard" and agentguard.finding.type: "ai_api_connection" and not agentguard.allowed: true'''
risk_score = 65
rule_id = "agentguard_008"
severity = "medium"
tags = ["AgentGuard", "Elastic Security", "AI Security"]
type = "threshold"

[rule.threshold]
field = ["host.name", "process.executable", "agentguard.ai.provider"]
value = 10
