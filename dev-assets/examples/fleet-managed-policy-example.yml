# Documentation-only example of the Elastic Agent policy Fleet renders for
# AgentGuard. Fleet owns the actual generated policy.
inputs:
  - id: filestream-agentguard-findings
    name: AgentGuard findings
    type: filestream
    use_output: default
    streams:
      - id: filestream-agentguard.findings-default
        data_stream:
          type: logs
          dataset: agentguard.findings
          namespace: default
        paths:
          - /var/log/agentguard/findings.ndjson
          - /var/log/agentguard/findings.ndjson
          - /Library/Logs/AgentGuard/findings.ndjson
          - /Library/Logs/AI-Sentinel/findings.ndjson
          - 'C:\ProgramData\AgentGuard\logs\findings.ndjson'
          - 'C:\ProgramData\AI-Sentinel\logs\findings.ndjson'
        parsers:
          - ndjson:
              target: ""
              add_error_key: true
              overwrite_keys: true
        pipeline: logs-agentguard.findings-default
        tags:
          - agentguard
          - agentguard
          - ai_activity
          - mcp_monitoring
          - endpoint_visibility
        fields:
          _conf:
            timezone: UTC
        processors: []
