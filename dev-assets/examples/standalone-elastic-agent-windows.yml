outputs:
  default:
    type: elasticsearch
    hosts: ["https://YOUR-ELASTICSEARCH-HOST:9200"]
    api_key: "${ELASTIC_API_KEY}"
    ssl.certificate_authorities:
      - 'C:\Program Files\Elastic\Agent\certs\http_ca.crt'

inputs:
  - id: agentguard-agentguard-findings-windows
    type: filestream
    streams:
      - id: agentguard-agentguard-findings-windows-stream
        data_stream:
          type: logs
          dataset: agentguard.findings
          namespace: default
        paths:
          - 'C:\ProgramData\AgentGuard\logs\findings.ndjson'
          - 'C:\ProgramData\AI-Sentinel\logs\findings.ndjson'
        parsers:
          - ndjson:
              target: ""
              add_error_key: true
              overwrite_keys: true
        pipeline: logs-agentguard.findings-default
        tags:
          - agentguard
          - agentguard
          - ai_activity
          - mcp_monitoring
          - endpoint_visibility
