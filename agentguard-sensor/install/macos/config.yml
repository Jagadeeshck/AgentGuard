output:
  path: /Library/Logs/AgentGuard/findings.ndjson
  format: ndjson
watch:
  interval: 60s
  state_file: /var/lib/agentguard/state.json
  emit_resolved: true
allowlist:
  path: /Library/Application Support/AgentGuard/allowlist.yml
privacy:
  redact_secrets: true
  collect_prompt_content: false
  collect_clipboard: false
  collect_browser_history: false
  collect_private_file_contents: false
  decrypt_traffic: false
