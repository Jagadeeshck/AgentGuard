format_version: 3.0.3
name: ai_sentinel
title: AgentGuard / AI Sentinel
version: 0.3.0
description: Collect AgentGuard / AI Sentinel ECS-compatible NDJSON findings from disk with Elastic Agent filestream and ingest them into Elastic Security.
type: integration
categories:
  - security
  - custom
conditions:
  kibana:
    version: ^8.13.0 || ^9.0.0
icons:
  - src: /img/logo.svg
    title: AgentGuard / AI Sentinel logo
    size: 32x32
    type: image/svg+xml
owner:
  github: elastic/security-service-integrations
  type: community
policy_templates:
  - name: ai_sentinel
    title: AgentGuard / AI Sentinel findings
    description: Collect AgentGuard / AI Sentinel NDJSON findings from disk using the Elastic Agent filestream input.
    inputs:
      - type: filestream
        title: AgentGuard / AI Sentinel findings logs
        description: Collect AgentGuard / AI Sentinel ECS-compatible NDJSON finding events from configured files.
