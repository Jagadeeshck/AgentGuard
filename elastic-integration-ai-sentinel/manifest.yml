format_version: 3.0.3
name: ai_sentinel
title: AI Sentinel
version: 0.1.0
description: Ingest AI Sentinel endpoint AI security findings into Elastic Security.
type: integration
categories:
  - security
  - custom
conditions:
  kibana:
    version: ^8.13.0 || ^9.0.0
icons:
  - src: /img/logo.svg
    title: AI Sentinel logo
    size: 32x32
    type: image/svg+xml
owner:
  github: elastic/security-service-integrations
  type: community
policy_templates:
  - name: ai_sentinel
    title: AI Sentinel logs
    description: Collect AI Sentinel ECS-compatible NDJSON findings using Elastic Agent filestream.
    inputs:
      - type: filestream
        title: AI Sentinel findings logs
        description: Collect AI Sentinel NDJSON finding events from disk.
