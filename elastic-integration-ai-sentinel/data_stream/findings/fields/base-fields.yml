- name: '@timestamp'
  type: date
  required: true
  description: Event timestamp generated by AI Sentinel when the finding was observed.
- name: message
  type: match_only_text
  description: Raw NDJSON log line before parsing when supplied by Elastic Agent. Do not rely on this field for prompt content or secrets.
- name: data_stream.type
  type: constant_keyword
  value: logs
  description: Data stream type.
- name: data_stream.dataset
  type: constant_keyword
  value: ai_sentinel.findings
  description: Data stream dataset for AI Sentinel findings.
- name: data_stream.namespace
  type: constant_keyword
  description: Data stream namespace configured in Fleet.
