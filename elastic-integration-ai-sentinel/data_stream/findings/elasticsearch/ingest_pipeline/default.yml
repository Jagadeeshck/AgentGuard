---
description: Parse and normalize AI Sentinel findings.
processors:
  - set:
      field: event.original
      copy_from: message
      ignore_empty_value: true
      if: ctx.tags != null && ctx.tags.contains('preserve_original_event')
  - json:
      field: message
      add_to_root: true
      if: ctx.message != null && ctx.message instanceof String && ctx.message.length() > 0 && ctx.message.trim().startsWith('{')
      on_failure:
        - set:
            field: event.kind
            value: pipeline_error
        - append:
            field: tags
            value: ai_sentinel_invalid_json
            allow_duplicates: false
        - set:
            field: error.message
            value: Invalid JSON payload
  - remove:
      field:
        - ai_sentinel.prompt
        - ai_sentinel.prompts
        - ai_sentinel.prompt_content
        - ai_sentinel.completion
        - ai_sentinel.response
        - ai_sentinel.secret
        - ai_sentinel.secrets
        - clipboard
        - browser.history
        - http.request.body.content
        - ai_sentinel.cyber_agent.prompt
        - ai_sentinel.cyber_agent.prompts
        - ai_sentinel.cyber_agent.prompt_content
        - ai_sentinel.cyber_agent.completion
        - ai_sentinel.cyber_agent.response
        - ai_sentinel.cyber_agent.secret
        - ai_sentinel.cyber_agent.secrets
      ignore_missing: true
      description: Drop prohibited sensitive payload fields if an upstream producer emits them accidentally.
  - remove:
      field: event.original
      ignore_missing: true
      if: ctx.tags == null || !ctx.tags.contains('preserve_original_event')
  - append:
      field: tags
      value: ai_sentinel
      allow_duplicates: false
  - append:
      field: tags
      value: ai_activity
      allow_duplicates: false
  - append:
      field: tags
      value: mcp_monitoring
      allow_duplicates: false
  - append:
      field: tags
      value: endpoint_visibility
      allow_duplicates: false
  - append:
      field: tags
      value: cyber_agent_activity
      allow_duplicates: false
      if: ctx.ai_sentinel?.cyber_agent != null || (ctx.ai_sentinel?.finding?.type != null && ['ai_cyber_agent_activity', 'ai_vulnerability_research_agent', 'ai_sandbox_escape_research', 'ai_fuzzing_activity', 'ai_reverse_engineering_activity', 'ai_exploit_development_activity', 'ai_security_tool_mcp_server', 'ai_agent_shell_tool_use', 'ai_agent_sensitive_repo_scan', 'ai_agent_mass_codebase_analysis'].contains(ctx.ai_sentinel.finding.type))
  - set:
      field: ecs.version
      value: 8.17.0
      override: false
  - set:
      field: event.module
      value: ai_sentinel
  - set:
      field: event.dataset
      value: ai_sentinel.findings
  - set:
      field: observer.vendor
      value: AI Sentinel
  - set:
      field: observer.product
      value: AI Sentinel
  - set:
      field: observer.type
      value: endpoint
  - set:
      field: event.kind
      value: alert
      if: ctx.event == null || ctx.event.kind == null
  - set:
      field: event.category
      value: [network]
      if: ctx.ai_sentinel?.finding?.type == 'ai_api_connection' || ctx.ai_sentinel?.finding?.type == 'local_llm_service'
  - set:
      field: event.category
      value: [configuration]
      if: ctx.ai_sentinel?.finding?.type == 'mcp_server' || ctx.ai_sentinel?.finding?.type == 'mcp_config_modified' || ctx.ai_sentinel?.finding?.type == 'browser_extension' || ctx.ai_sentinel?.finding?.type == 'startup_item'
  - set:
      field: event.category
      value: [process]
      if: ctx.ai_sentinel?.finding?.type == 'suspicious_agent_process'
  - set:
      field: event.category
      value: [process]
      if: ctx.ai_sentinel?.finding?.type != null && ['ai_cyber_agent_activity', 'ai_vulnerability_research_agent', 'ai_sandbox_escape_research', 'ai_fuzzing_activity', 'ai_reverse_engineering_activity', 'ai_exploit_development_activity', 'ai_security_tool_mcp_server', 'ai_agent_shell_tool_use', 'ai_agent_mass_codebase_analysis'].contains(ctx.ai_sentinel.finding.type)
  - set:
      field: event.category
      value: [file]
      if: ctx.ai_sentinel?.finding?.type == 'ai_agent_sensitive_repo_scan'
  - set:
      field: event.type
      value: [connection]
      if: ctx.ai_sentinel?.finding?.type == 'ai_api_connection'
  - set:
      field: event.type
      value: [info]
      if: ctx.ai_sentinel?.finding?.type == 'local_llm_service' || ctx.ai_sentinel?.finding?.type == 'mcp_server' || ctx.ai_sentinel?.finding?.type == 'mcp_config_modified' || ctx.ai_sentinel?.finding?.type == 'browser_extension'
  - set:
      field: event.type
      value: [creation]
      if: ctx.ai_sentinel?.finding?.type == 'startup_item'
  - set:
      field: event.type
      value: [creation]
      if: ctx.ai_sentinel?.finding?.type == 'ai_exploit_development_activity'
  - set:
      field: event.type
      value: [info]
      if: ctx.ai_sentinel?.finding?.type != null && ['ai_cyber_agent_activity', 'ai_vulnerability_research_agent', 'ai_sandbox_escape_research', 'ai_fuzzing_activity', 'ai_reverse_engineering_activity', 'ai_security_tool_mcp_server', 'ai_agent_shell_tool_use', 'ai_agent_sensitive_repo_scan', 'ai_agent_mass_codebase_analysis'].contains(ctx.ai_sentinel.finding.type)
  - set:
      field: event.type
      value: [info]
      if: ctx.event == null || ctx.event.type == null
  - set:
      field: event.action
      copy_from: ai_sentinel.finding.type
      ignore_empty_value: true
      if: ctx.event == null || ctx.event.action == null
  - set:
      field: event.outcome
      value: success
      if: ctx.event == null || ctx.event.outcome == null
  - set:
      field: event.risk_score
      copy_from: ai_sentinel.risk.score
      ignore_empty_value: true
  - set:
      field: event.severity
      value: 21
      if: ctx.ai_sentinel?.risk?.level == 'low' && (ctx.event == null || ctx.event.severity == null)
  - set:
      field: event.severity
      value: 47
      if: ctx.ai_sentinel?.risk?.level == 'medium' && (ctx.event == null || ctx.event.severity == null)
  - set:
      field: event.severity
      value: 73
      if: ctx.ai_sentinel?.risk?.level == 'high' && (ctx.event == null || ctx.event.severity == null)
  - set:
      field: event.severity
      value: 99
      if: ctx.ai_sentinel?.risk?.level == 'critical' && (ctx.event == null || ctx.event.severity == null)
  - script:
      lang: painless
      description: Redact common secret patterns from command, MCP, environment-like, URL, header, and path fields without high-complexity regex.
      source: |
        String chAt(String v, int pos) {
          if (v == null || pos < 0 || pos >= v.length()) return "";
          return v.substring(pos, pos + 1);
        }
        boolean isBoundaryChar(String v, int pos) {
          if (pos < 0 || pos >= v.length()) return true;
          String c = chAt(v, pos);
          String lower = c.toLowerCase();
          boolean isLetter = lower.compareTo("a") >= 0 && lower.compareTo("z") <= 0;
          boolean isDigit = c.compareTo("0") >= 0 && c.compareTo("9") <= 0;
          return !isLetter && !isDigit && c != "_" && c != "-";
        }
        boolean isWhitespace(String c) {
          return c == " " || c == "\t" || c == "\r" || c == "\n";
        }
        boolean isValueDelimiter(String c) {
          return c == "" || isWhitespace(c) || c == "&" || c == "," || c == ";" || c == "\"" || c == "'";
        }
        String redactRange(String v, int start, int end) {
          if (start < 0 || end < start || start > v.length()) return v;
          return v.substring(0, start) + "[REDACTED]" + v.substring(end);
        }
        String redactBearer(String v) {
          String lower = v.toLowerCase();
          int from = 0;
          while (from < v.length()) {
            int idx = lower.indexOf("bearer", from);
            if (idx < 0) return v;
            int valueStart = idx + 6;
            if (!isBoundaryChar(v, idx - 1) || valueStart >= v.length() || (!isWhitespace(chAt(v, valueStart)))) {
              from = idx + 6;
              continue;
            }
            while (valueStart < v.length() && isWhitespace(chAt(v, valueStart))) valueStart++;
            int valueEnd = valueStart;
            while (valueEnd < v.length() && !isValueDelimiter(chAt(v, valueEnd))) valueEnd++;
            if (valueEnd > valueStart) {
              v = redactRange(v, valueStart, valueEnd);
              lower = v.toLowerCase();
              from = valueStart + 10;
            } else {
              from = idx + 6;
            }
          }
          return v;
        }
        String redactKeyValue(String v, String key) {
          String lower = v.toLowerCase();
          String keyLower = key.toLowerCase();
          int from = 0;
          while (from < v.length()) {
            int idx = lower.indexOf(keyLower, from);
            if (idx < 0) return v;
            int afterKey = idx + key.length();
            if (!isBoundaryChar(v, idx - 1)) {
              from = afterKey;
              continue;
            }
            int sep = afterKey;
            while (sep < v.length() && isWhitespace(chAt(v, sep))) sep++;
            if (sep >= v.length() || (chAt(v, sep) != "=" && chAt(v, sep) != ":")) {
              from = afterKey;
              continue;
            }
            int valueStart = sep + 1;
            while (valueStart < v.length() && isWhitespace(chAt(v, valueStart))) valueStart++;
            int valueEnd = valueStart;
            while (valueEnd < v.length() && !isValueDelimiter(chAt(v, valueEnd))) valueEnd++;
            if (valueEnd > valueStart) {
              v = redactRange(v, valueStart, valueEnd);
              lower = v.toLowerCase();
              from = valueStart + 10;
            } else {
              from = afterKey;
            }
          }
          return v;
        }
        String redactCliFlag(String v, String flag) {
          String lower = v.toLowerCase();
          String flagLower = flag.toLowerCase();
          int from = 0;
          while (from < v.length()) {
            int idx = lower.indexOf(flagLower, from);
            if (idx < 0) return v;
            int afterFlag = idx + flag.length();
            if (!isBoundaryChar(v, idx - 1) || (afterFlag < v.length() && !isBoundaryChar(v, afterFlag))) {
              from = afterFlag;
              continue;
            }
            int valueStart = afterFlag;
            if (valueStart < v.length() && chAt(v, valueStart) == "=") {
              valueStart++;
            } else if (valueStart < v.length() && isWhitespace(chAt(v, valueStart))) {
              while (valueStart < v.length() && isWhitespace(chAt(v, valueStart))) valueStart++;
            } else {
              from = afterFlag;
              continue;
            }
            int valueEnd = valueStart;
            while (valueEnd < v.length() && !isValueDelimiter(chAt(v, valueEnd))) valueEnd++;
            if (valueEnd > valueStart) {
              v = redactRange(v, valueStart, valueEnd);
              lower = v.toLowerCase();
              from = valueStart + 10;
            } else {
              from = afterFlag;
            }
          }
          return v;
        }
        String redact(String v) {
          if (v == null) return null;
          v = redactBearer(v);
          String[] keys = new String[] {"access_token", "api_key", "apikey", "api-key", "token", "secret", "password", "passwd", "pwd"};
          for (String key : keys) v = redactKeyValue(v, key);
          String[] flags = new String[] {"--api-key", "--token", "--secret", "--password"};
          for (String flag : flags) v = redactCliFlag(v, flag);
          return v;
        }
        void redactPath(Map m, String path) {
          def parts = path.splitOnToken(".");
          def cur = m;
          for (int i = 0; i < parts.length - 1; i++) {
            if (!(cur instanceof Map) || !cur.containsKey(parts[i])) return;
            cur = cur[parts[i]];
          }
          def k = parts[parts.length - 1];
          if (cur instanceof Map && cur.containsKey(k)) {
            def val = cur[k];
            if (val instanceof String) cur[k] = redact(val);
            else if (val instanceof List) {
              for (int j = 0; j < val.size(); j++) if (val[j] instanceof String) val[j] = redact(val[j]);
            }
          }
        }
        String[] fields = new String[] {
          "process.command_line", "ai_sentinel.mcp.server.command", "ai_sentinel.mcp.server.args",
          "ai_sentinel.mcp.config.path", "ai_sentinel.startup.command", "ai_sentinel.startup.path",
          "ai_sentinel.ai.endpoint", "ai_sentinel.cyber_agent.target_paths", "url.full", "http.request.headers.authorization"
        };
        for (String f : fields) redactPath(ctx, f);
  - append:
      field: related.hosts
      value: '{{{host.name}}}'
      allow_duplicates: false
      if: ctx.host?.name != null
  - append:
      field: related.user
      value: '{{{user.name}}}'
      allow_duplicates: false
      if: ctx.user?.name != null
  - append:
      field: related.ip
      value: '{{{destination.ip}}}'
      allow_duplicates: false
      if: ctx.destination?.ip != null
  - append:
      field: related.ip
      value: '{{{source.ip}}}'
      allow_duplicates: false
      if: ctx.source?.ip != null
on_failure:
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: tags
      value: ai_sentinel_pipeline_failure
      allow_duplicates: false
  - set:
      field: error.message
      value: '{{{ _ingest.on_failure_message }}}'
