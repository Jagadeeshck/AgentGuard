description: Pipeline for processing AgentGuard AI Sentinel findings
processors:
  - date:
      field: '@timestamp'
      formats:
        - ISO8601
      if: ctx['@timestamp'] != null
  - set:
      field: event.kind
      value: event
  - set:
      field: event.category
      value:
        - threat
  - rename:
      field: finding_type
      target_field: agentguard.finding.type
      ignore_missing: true
  - rename:
      field: finding_category
      target_field: agentguard.finding.category
      ignore_missing: true
  - rename:
      field: severity
      target_field: agentguard.finding.severity
      ignore_missing: true
  - set:
      field: event.action
      copy_from: agentguard.finding.type
      ignore_empty_value: true
on_failure:
  - set:
      field: error.message
      value: '{{ _ingest.on_failure_message }}'
