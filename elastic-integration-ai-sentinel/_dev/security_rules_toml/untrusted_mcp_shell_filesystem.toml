[rule]
author = ["AI Sentinel"]
description = "Detects untrusted mcp server with shell or filesystem access from AI Sentinel findings."
from = "now-5m"
index = ["logs-ai_sentinel.findings-*"]
language = "kuery"
license = "Elastic License v2"
name = "Untrusted MCP Server With Shell or Filesystem Access"
query = '''event.module: "ai_sentinel" and ai_sentinel.finding.type: "mcp_server" and not ai_sentinel.allowed: true and ai_sentinel.mcp.capabilities: ("shell" or "filesystem")'''
references = []
risk_score = 75
rule_id = "ai_sentinel_002"
severity = "high"
tags = ["AI Sentinel", "Elastic Security", "AI Security"]
type = "query"
