[rule]
author = ["AI Sentinel"]
description = "Detects ai tool added to startup from AI Sentinel findings."
from = "now-5m"
index = ["logs-ai_sentinel.findings-*"]
language = "kuery"
license = "Elastic License v2"
name = "AI Tool Added to Startup"
query = '''event.module: "ai_sentinel" and ai_sentinel.finding.type: "startup_item" and not ai_sentinel.allowed: true'''
references = []
risk_score = 50
rule_id = "ai_sentinel_006"
severity = "medium"
tags = ["AI Sentinel", "Elastic Security", "AI Security"]
type = "query"
