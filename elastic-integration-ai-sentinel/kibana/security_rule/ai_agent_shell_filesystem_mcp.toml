[rule]
author = ["AI Sentinel"]
description = "Detects AI agent findings with both shell and filesystem MCP capabilities, which can enable autonomous codebase inspection and tool execution."
from = "now-5m"
index = ["logs-ai_sentinel.findings-*"]
language = "kuery"
license = "Elastic License v2"
name = "AI Agent With Shell and Filesystem MCP Access"
query = '''event.module: "ai_sentinel" and not ai_sentinel.allowed: true and ai_sentinel.finding.type: ("ai_agent_shell_tool_use" or "ai_security_tool_mcp_server" or "ai_cyber_agent_activity") and ai_sentinel.cyber_agent.capabilities: "shell" and ai_sentinel.cyber_agent.capabilities: "filesystem"'''
references = []
risk_score = 85
rule_id = "ai_sentinel_010"
severity = "high"
tags = ["AI Sentinel", "Elastic Security", "AI Security", "MCP", "AI Cyber-Agent"]
type = "query"
