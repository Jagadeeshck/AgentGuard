name: AgentGuard OTEL Integration CI

on:
  pull_request:
    paths:
      - 'integrations/otel-agentguard/**'
      - '.github/workflows/otel-agentguard-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'integrations/otel-agentguard/**'
      - '.github/workflows/otel-agentguard-ci.yml'

permissions:
  contents: read

jobs:
  validate-otel-agentguard:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install validators
        run: python -m pip install pyyaml jsonschema

      - name: Validate YAML syntax
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml
          for path in Path('integrations/otel-agentguard/collector').glob('*.y*ml'):
              with path.open() as f:
                  yaml.safe_load(f)
              print(f'validated {path}')
          PY

      - name: Validate JSON syntax
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          for path in Path('integrations/otel-agentguard').rglob('*.json'):
              with path.open() as f:
                  json.load(f)
              print(f'validated {path}')
          PY

      - name: Validate examples against schema
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          from jsonschema import Draft202012Validator
          schema = json.loads(Path('integrations/otel-agentguard/schema/agentguard-otel-event.schema.json').read_text())
          validator = Draft202012Validator(schema)
          for path in Path('integrations/otel-agentguard/examples').glob('*.json'):
              validator.validate(json.loads(path.read_text()))
              print(f'validated {path}')
          for path in Path('integrations/otel-agentguard/examples').glob('*.ndjson'):
              for line_number, line in enumerate(path.read_text().splitlines(), 1):
                  if line.strip():
                      validator.validate(json.loads(line))
                      print(f'validated {path}:{line_number}')
          PY

      - name: Shellcheck example scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: integrations/otel-agentguard/examples
