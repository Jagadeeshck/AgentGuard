name: AgentGuard Elastic Integration CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  elastic-package-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve Elastic package directory
        run: |
          set -euo pipefail
          if [ -d "integrations/elastic-agentguard" ] && [ -f "integrations/elastic-agentguard/manifest.yml" ]; then
            echo "PACKAGE_DIR=integrations/elastic-agentguard" >> "$GITHUB_ENV"
          elif [ -f "manifest.yml" ]; then
            echo "PACKAGE_DIR=." >> "$GITHUB_ENV"
          else
            echo "Could not find Elastic package manifest.yml" >&2
            find . -maxdepth 4 -name manifest.yml -print
            exit 1
          fi

      - name: Install latest elastic-package
        run: |
          set -euo pipefail
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi
          url="$(curl -fsSL ${GITHUB_API_URL:-https://api.github.com}/repos/elastic/elastic-package/releases/latest | jq -r '.assets[] | select(.name | test("linux_amd64\\.tar\\.gz$")) | .browser_download_url' | head -n 1)"
          if [ -z "$url" ] || [ "$url" = "null" ]; then
            echo "Could not find linux_amd64 elastic-package release asset" >&2
            exit 1
          fi
          curl -fsSL "$url" -o elastic-package.tar.gz
          mkdir -p elastic-package-bin
          tar -xzf elastic-package.tar.gz -C elastic-package-bin
          sudo install -m 0755 "$(find elastic-package-bin -type f -name elastic-package | head -n 1)" /usr/local/bin/elastic-package
          elastic-package version

      - name: Docker diagnostics
        run: |
          docker version
          docker compose version || true

      - name: Lint and build Elastic package
        run: |
          cd "$PACKAGE_DIR"
          elastic-package lint
          elastic-package build

      - name: Start Elasticsearch for pipeline tests
        timeout-minutes: 10
        run: |
          cd "$PACKAGE_DIR"
          elastic-package stack up -d --services=elasticsearch
          echo "ELASTIC_STACK_STARTED=true" >> "$GITHUB_ENV"

      - name: Run pipeline tests
        timeout-minutes: 15
        run: |
          cd "$PACKAGE_DIR"
          elastic-package test pipeline

      - name: Stop Elastic stack
        if: always()
        run: |
          if [ "${ELASTIC_STACK_STARTED:-false}" = "true" ]; then
            cd "$PACKAGE_DIR"
            elastic-package stack down || true
          else
            echo "Elastic stack was not started; skipping stack down."
          fi
