name: AgentGuard E2E Validation (Manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run E2E validation if present
        run: |
          set -euo pipefail
          if [ -x "scripts/e2e-validate-sensor-output.sh" ]; then
            scripts/e2e-validate-sensor-output.sh
          elif [ -f "scripts/e2e-validate-sensor-output.sh" ]; then
            bash scripts/e2e-validate-sensor-output.sh
          elif [ -x "elastic-integration-ai-sentinel/scripts/e2e-validate-sensor-output.sh" ]; then
            elastic-integration-ai-sentinel/scripts/e2e-validate-sensor-output.sh
          elif [ -f "elastic-integration-ai-sentinel/scripts/e2e-validate-sensor-output.sh" ]; then
            bash elastic-integration-ai-sentinel/scripts/e2e-validate-sensor-output.sh
          else
            echo "E2E script not present; skipping."
          fi
