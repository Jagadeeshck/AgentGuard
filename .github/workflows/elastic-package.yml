name: Elastic Package Validation

on:
  pull_request:
    paths:
      - "elastic-integration-ai-sentinel/**"
      - ".github/workflows/elastic-package.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "elastic-integration-ai-sentinel/**"
      - ".github/workflows/elastic-package.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  elastic-package:
    name: Lint, build, and pipeline tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elastic-integration-ai-sentinel
    env:
      ELASTIC_PACKAGE: >-
        docker run --rm
        -v ${{ github.workspace }}/elastic-integration-ai-sentinel:/package
        -v /var/run/docker.sock:/var/run/docker.sock
        -w /package
        docker.elastic.co/elastic-package/elastic-package:0.123.0
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show elastic-package version
        run: $ELASTIC_PACKAGE version

      - name: Lint package
        run: make lint

      - name: Build package
        run: make build

      - name: Run ingest pipeline tests
        run: make test-pipeline
